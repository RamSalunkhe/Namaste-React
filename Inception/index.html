<html lang="en">
<head>

</head>
<body>

    <div id="root">
        <h1>Namaste Everyone from HTML!</h1>

     <!-- we can do same above thing using React CDN -->

    <script 
        crossorigin 
        src="https://unpkg.com/react@18/umd/react.development.js">

   <script src="App.js"></script>
