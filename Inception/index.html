<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namaste React</title>
</head>
<body>

    <div id="root">
        <h1>Namaste Everyone from HTML!</h1>
    </div>

     <!-- we can do same above thing using React CDN -->

    <script 
        crossorigin 
        src="https://unpkg.com/react@18/umd/react.development.js">
    </script> 
    <!-- we have injected core library of React here  -->

    <script 
        crossorigin 
        src="https://unpkg.com/react-dom@18/umd/react-dom.development.js">
    </script> 
    <!-- we have injected library which gives access to DOM (web version of React)
    suppose if i want to write some react code which goes into the browser, it happen over here -->

   <script>                          
    const heading = React.createElement("h1", {
        id:"title" // it stores tag attributes like id="title", style=""   we call it as PROPS
    }, "Namaste Everyone from React!");  // creates h1 tag => NOW we need to put this heading into root 

    
    //creating root 
    // we have to tell react that, this is the root element this is the place i want my react to run
    // createRoot() tells react that, what is the root element inside my app

    console.log(heading); // React element is an object 

    const root = ReactDOM.createRoot(document.getElementById("root")); // root is the place where react runs other HTML code won't affect

    // passing a react element inside the root element
    // render() takes react element and modifies our DOM (injects into the DOM note: see => inspect => elemets)
    // render() will override everything eg. line no. 12 will override with line no. 34

    root.render(heading); 

   </script>
</body>
</html>
