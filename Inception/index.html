<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namaste React</title>
</head>
<body>
    <div id="root">
        <h1>Namaste Everyone from HTML!</h1>
    </div>

     <!-- we can do same above thing using javascript with DOM manipulation  -->

    <script>

        const heading = document.createElement("h1") // created h1 tag using javascript
        
        heading.innerHTML =  "Namate Everyone from javascript!";

        // now we put this heading into root by appendChild method

        const root = document.getElementById("root");

        root.appendChild(heading);

    </script>
</body>
</html>
